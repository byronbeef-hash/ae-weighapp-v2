<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ea043"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Border accent -->
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.5"/>
  <!-- Scales icon (simplified weight indicator) -->
  <g transform="translate(256, 160)">
    <!-- Scale platform -->
    <rect x="-80" y="20" width="160" height="12" rx="6" fill="#3fb950"/>
    <!-- Scale base -->
    <rect x="-20" y="32" width="40" height="40" rx="4" fill="#3fb950" opacity="0.7"/>
    <!-- Weight reading lines -->
    <rect x="-60" y="-10" width="120" height="8" rx="4" fill="#3fb950" opacity="0.4"/>
    <rect x="-40" y="-28" width="80" height="8" rx="4" fill="#3fb950" opacity="0.3"/>
  </g>
  <!-- "AgriEID" text -->
  <text x="256" y="310" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="72" fill="#e6edf3" letter-spacing="2">Agri</text>
  <text x="256" y="385" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="80" fill="#3fb950" letter-spacing="4">EID</text>
  <!-- RFID tag icon -->
  <g transform="translate(256, 440)" opacity="0.5">
    <rect x="-30" y="-8" width="60" height="16" rx="4" fill="#3fb950"/>
    <circle cx="-18" cy="0" r="3" fill="#0d1117"/>
    <!-- Signal waves -->
    <path d="M 20 -12 Q 30 0 20 12" fill="none" stroke="#3fb950" stroke-width="2"/>
    <path d="M 26 -18 Q 40 0 26 18" fill="none" stroke="#3fb950" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
